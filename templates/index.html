<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SDMA Mall</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/neodgm/neodgm-webfont@1.530/neodgm/style.css">
  <link rel="stylesheet" href="__BASE_PATH__/static/styles.css">
</head>
<body data-base-path="__BASE_PATH__">
  <section id="intro" class="intro">
    <div class="rainbow"></div>
    <div class="intro-center">
      <h1>&lt; 우주 쇼핑몰 &gt;</h1>
      <button id="openLogin" class="pixel-button yellow" type="button">&gt;&gt;나는 물건을 본다</button>
      <p class="blink">놀랍다 가격 !</p>
    </div>
    <button id="alienButton" class="alien-button" type="button" aria-label="관리자 입구">🛸</button>
    <p class="intro-caption">{ 어쨌든 재단장 기념 할인 행사 중이라는 거지 }</p>
  </section>

  <main id="mall" class="mall hidden">
    <header class="shop-header">
      <div class="brand-lock">A</div>
      <div class="brand-text">SDMA<span>SPACE</span></div>
      <div class="staff-badge">임직원 전용</div>
      <div class="user-chip" id="userChip"></div>
      <button id="cartToggle" class="cart-button" type="button" aria-label="장바구니">▣<b id="cartCount">0</b></button>
    </header>

    <section class="promo-panel">
      <div class="promo-card">
        <h2>&lt; 우주 임직원 포인트몰 개장&gt;</h2>
        <p>외계에서 온 멋진 물건들! 복지포인트로 <mark>100% 결제</mark> 가능</p>
        <button class="pixel-button black" type="button" onclick="document.getElementById('products').scrollIntoView({behavior:'smooth'})">&gt;&gt;&gt; 기획전 보러가기</button>
      </div>
      <div class="promo-star">☆</div>
    </section>

    <section class="section-bar">
      <h2>추천 보급품</h2>
      <p>총 <b id="productCount">0</b>개</p>
    </section>
    <section id="products" class="product-grid"></section>
  </main>

  <aside id="cartDrawer" class="cart-drawer hidden">
    <div class="drawer-head">
      <h2>장바구니</h2>
      <button class="icon-button" type="button" id="closeCart">×</button>
    </div>
    <div id="cartItems" class="cart-items"></div>
    <div class="cart-total">
      <span>총 합계</span>
      <strong id="cartTotal">0 P</strong>
    </div>
    <button id="checkoutButton" class="pixel-button black full" type="button">결제하기</button>
    <p id="cartMessage" class="message"></p>
  </aside>

  <dialog id="loginDialog" class="modal">
    <form method="dialog" class="modal-box">
      <h2>사번 입력</h2>
      <p>등록된 사번으로 SDMA mall에 입장합니다.</p>
      <input id="employeeInput" autocomplete="off" placeholder="예: SDMA001">
      <div class="modal-actions">
        <button class="pixel-button" value="cancel" type="submit">취소</button>
        <button id="loginSubmit" class="pixel-button yellow" value="default" type="button">입장</button>
      </div>
      <p id="loginMessage" class="message"></p>
    </form>
  </dialog>

  <dialog id="adminDialog" class="modal">
    <form method="dialog" class="modal-box">
      <h2>관리자 코드</h2>
      <p>외계인 버튼을 너무 많이 눌렀습니다.</p>
      <input id="adminCodeInput" type="password" placeholder="관리자 코드">
      <div class="modal-actions">
        <button class="pixel-button" value="cancel" type="submit">닫기</button>
        <button id="adminSubmit" class="pixel-button yellow" value="default" type="button">이동</button>
      </div>
      <p id="adminMessage" class="message"></p>
    </form>
  </dialog>

  <dialog id="receiptDialog" class="modal">
    <div class="modal-box receipt-modal">
      <div class="party">🎉</div>
      <h2><mark>결제 완료!</mark></h2>
      <p>보급품 구매가 성공적으로 처리되었습니다.</p>
      <pre id="receiptText" class="receipt"></pre>
      <div class="modal-actions">
        <button id="copyReceipt" class="pixel-button" type="button">영수증 복사</button>
        <button id="continueShopping" class="pixel-button black" type="button">쇼핑 계속하기</button>
      </div>
    </div>
  </dialog>

  <script src="__BASE_PATH__/static/app.js"></script>
</body>
</html>
